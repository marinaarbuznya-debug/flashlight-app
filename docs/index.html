<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ліхтарик</title>
<style>
  :root { --bg: #0a0a0a; --on: #FFD700; --text: #e0e0e0; --dim: #444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 48px; }
  h1 { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--dim); }
  .lamp { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #fff9c4, #FFD700, #b8860b); transition: all 0.4s ease; opacity: 0.15; }
  .lamp.on { opacity: 1; box-shadow: 0 0 40px 20px rgba(255,215,0,0.4), 0 0 100px 60px rgba(255,200,0,0.2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 40px 20px rgba(255,215,0,0.4)}50%{box-shadow:0 0 60px 30px rgba(255,215,0,0.6)} }
  .buttons { display: flex; gap: 16px; }
  button { font-family: monospace; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; padding: 16px 32px; border: 1px solid; border-radius: 2px; cursor: pointer; background: transparent; }
  #btnOn { border-color: var(--on); color: var(--on); }
  #btnOff { border-color: var(--dim); color: var(--dim); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #status { font-size: 11px; letter-spacing: 2px; color: var(--dim); min-height: 20px; }
  #status.ok { color: #4caf50; }
  #status.err { color: #f44336; }
  #status.loading { color: var(--on); }
</style>
</head>

<div class="buttons">
  <button id="btnOn" onclick="send('on')">Увімкнути</button>

async function loadToken() {
  const resp = await fetch(`${DB_URL}/token.json`);
  FCM_TOKEN = await resp.json();
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

async function getAccessToken() {
  const header = { alg: 'RS256', typ: 'JWT' };
  const now = Math.floor(Date.now() / 1000);
  const payload = { iss: CLIENT_EMAIL, scope: 'https://www.googleapis.com/auth/firebase.messaging', aud: 'https://oauth2.googleapis.com/token', exp: now + 3600, iat: now };
  const b64 = obj => btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const signingInput = `${b64(header)}.${b64(payload)}`;
  const keyData = PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g, '');
  const binaryKey = Uint8Array.from(atob(keyData), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey('pkcs8', binaryKey.buffer, { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' }, false, ['sign']);
  const signature = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, new TextEncoder().encode(signingInput));
  const b64sig = btoa(String.fromCharCode(...new Uint8Array(signature))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt = `${signingInput}.${b64sig}`;
  const resp = await fetch('https://oauth2.googleapis.com/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}` });
  const data = await resp.json();
  return data.access_token;
}

async function send(command) {
  document.getElementById('btnOn').disabled = true;
  document.getElementById('btnOff').disabled = true;
  setStatus('надсилаю команду...', 'loading');
  try {
    await loadToken();
    const token = await getAccessToken();
    const resp = await fetch(`https://fcm.googleapis.com/v1/projects/${PROJECT_ID}/messages:send`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: { token: FCM_TOKEN, data: { command } } })
    });
    if (resp.ok) {
      const lamp = document.getElementById('lamp');
      if (command === 'on') { lamp.classList.add('on'); setStatus('✓ ліхтарик увімкнено', 'ok'); }
      else { lamp.classList.remove('on'); setStatus('✓ ліхтарик вимкнено', 'ok'); }
    } else {
      const err = await resp.json();
      setStatus('помилка: ' + (err.error?.message || 'невідома'), 'err');
    }
  } catch(e) { setStatus('помилка з\'єднання', 'err'); }
  document.getElementById('btnOn').disabled = false;
  document.getElementById('btnOff').disabled = false;
}
